<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalMovies Web</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: sans-serif;
        }

        .search-container {
            position: sticky;
            top: 0;
            background: #121212;
            z-index: 100;
            padding: 15px 0;
        }

        .movie-card {
            background: #1e1e1e;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 4px solid #0d6efd;
        }

        .movie-card.deleted,
        .movie-card.deleted .text-white,
        .movie-card.deleted .quality,
        .movie-card.deleted .info-row,
        .movie-card.deleted .rating {
            color: #ff4444 !important;
        }

        .quality {
            font-weight: bold;
            color: #ffc107;
        }

        .info-row {
            font-size: 0.9em;
            color: #aaa;
            margin-top: 5px;
        }

        .rating {
            color: #00ff88;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="app" class="container">
        <div class="search-container">
            <input type="text" v-model="search" class="form-control bg-dark text-white border-secondary" placeholder="Buscar película...">
            <div class="mt-2 small text-muted">Películas encontradas: {{ filteredMovies.length }}</div>
        </div>

        <div class="movie-list">
            <div v-for="m in filteredMovies" :key="m.Title" class="movie-card shadow" :class="{ deleted: m.Status === '(DELETED)' }">

                <div class="d-flex justify-content-between align-items-start">
                    <h6 class="mb-0 text-white">
                        {{ m.Title }}                 
                        <span v-if="m.Year" class="text-secondary small">({{ m.Year }})</span>
                            <span v-if="m.Status === '(DELETED)'" class="ms-1">🗑️</span>
                    </h6>
                    <span class="quality small">{{ m.Quality }}</span>
                </div>

                <div class="info-row">
                    <span v-if="m.Channel && m.Channel !== '-'">
                        📺 {{ m.Channel }}
                    </span>
                </div>

                <div class="info-row d-flex justify-content-between">
                    <span>⏱ {{ m.Duration }} <span v-if="m.BitRate">| 📊 {{ m.BitRate }} kbps</span></span>
                    <span v-if="m.Rating" class="rating">⭐ {{ m.Rating }}</span>
                </div>

            </div>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <script>

        const { createApp } = Vue;

        createApp({
            data() { return { search: '', movies: [] } },
            computed: {
                filteredMovies() {
                    const normalize = str => str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
                    const s = normalize(this.search);
                    return this.movies.filter(m => normalize(m.Title).includes(s));
                }
            },
            mounted() {
                fetch('movies.json?t=' + new Date().getTime())
                    .then(r => r.json())
                    .then(data => {
                        this.movies = data.sort((a, b) => a.Title.localeCompare(b.Title));
                    });
            }
        }).mount('#app');

    </script>
</body>
</html>
